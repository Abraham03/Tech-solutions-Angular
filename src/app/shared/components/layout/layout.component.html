<div class="flex h-screen bg-gray-50 dark:bg-surface-dark overflow-hidden transition-colors duration-300">
  
  @if (isMobileMenuOpen()) {
    <div 
      class="fixed inset-0 z-40 bg-gray-900/50 backdrop-blur-sm md:hidden" 
      (click)="toggleMobileMenu()">
    </div>
  }

  <aside 
    class="fixed inset-y-0 left-0 z-50 w-64 transform bg-white dark:bg-surface-paper border-r border-gray-200 dark:border-surface-border flex flex-col transition-transform duration-300 ease-in-out md:relative md:translate-x-0"
    [ngClass]="isMobileMenuOpen() ? 'translate-x-0' : '-translate-x-full'">
    
    <div class="h-16 flex items-center justify-between px-6 border-b border-gray-200 dark:border-surface-border shrink-0">
      <span class="text-xl font-bold text-gray-900 dark:text-white tracking-wide">Tech Solutions</span>
      <button class="md:hidden text-gray-500 hover:text-gray-700 dark:text-gray-400" (click)="toggleMobileMenu()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    
    <nav class="flex-1 overflow-y-auto p-4 space-y-2" (click)="closeMobileMenu()">
      
      <ng-container *ngIf="user()?.role === 'admin'">
        <a routerLink="/admin/dashboard" routerLinkActive="bg-brand-primary text-white" class="flex items-center gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-[#202433] transition-colors">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </a>

        <a routerLink="/admin/projects" routerLinkActive="bg-brand-primary text-white" class="flex items-center gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-[#202433] transition-colors">
          <mat-icon>folder</mat-icon>
          <span>Proyectos</span>
        </a>

        <a routerLink="/admin/clients" routerLinkActive="bg-brand-primary text-white" class="flex items-center gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-[#202433] transition-colors">
          <mat-icon>people</mat-icon>
          <span>Clientes</span>
        </a>

        <a routerLink="/admin/services" routerLinkActive="bg-brand-primary text-white" class="flex items-center gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-[#202433] transition-colors">
          <mat-icon>dns</mat-icon>
          <span>Infraestructura</span>
        </a>

        <a routerLink="/admin/payments" routerLinkActive="bg-brand-primary text-white" class="flex items-center gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-[#202433] transition-colors">
          <mat-icon>payments</mat-icon>
          <span>Pagos</span>
        </a>

        <a routerLink="/admin/users" routerLinkActive="bg-brand-primary text-white" class="flex items-center gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-[#202433] transition-colors">
          <mat-icon>manage_accounts</mat-icon>
          <span>Usuarios</span>
        </a>
      </ng-container>

      <!-- ZONA DEL CLIENTE -->
      <ng-container *ngIf="user()?.role === 'client'">
        <a routerLink="/client/dashboard" routerLinkActive="bg-brand-primary text-white" class="flex items-center gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-[#202433] transition-colors">
          <mat-icon>dashboard</mat-icon>
          <span>Mi Resumen</span>
        </a>
      </ng-container>
      <!-- FIN ZONA DEL CLIENTE -->

    </nav>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    
    <header class="h-16 bg-white dark:bg-surface-paper border-b border-gray-200 dark:border-surface-border flex items-center justify-between px-4 sm:px-6 z-10 transition-colors duration-300 shrink-0">
      
      <div class="flex items-center gap-4">
        <button (click)="toggleMobileMenu()" class="md:hidden p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-surface-border transition-colors">
          <mat-icon>menu</mat-icon>
        </button>
      </div>
      
      <div class="flex items-center gap-2 sm:gap-4">
        <button (click)="toggleDarkMode()" class="p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-surface-border transition-colors">
          <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <button [matMenuTriggerFor]="userMenu" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-surface-border transition-colors font-medium text-sm">
          <mat-icon class="scale-90">account_circle</mat-icon>
          <span class="hidden sm:inline">{{ user()?.name || 'Usuario' }}</span>
        </button>
        
        <mat-menu #userMenu="matMenu" class="dark:bg-surface-paper">
          <button mat-menu-item (click)="logout()">
            <mat-icon>exit_to_app</mat-icon>
            <span>Cerrar Sesión</span>
          </button>
        </mat-menu>
      </div>
    </header>

    <div class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-6 lg:p-8 text-gray-900 dark:text-gray-100">
      <router-outlet></router-outlet>
    </div>
    
  </main>
</div>
