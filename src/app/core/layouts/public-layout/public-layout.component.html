<div class="min-h-screen flex flex-col bg-white dark:bg-surface-dark transition-colors duration-300">
  
  <nav class="sticky top-0 z-50 bg-white/80 dark:bg-surface-dark/80 backdrop-blur-md border-b border-gray-100 dark:border-surface-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-20 items-center">
        <div class="flex items-center gap-3 cursor-pointer group" routerLink="/">
          <img src="img/Logo.png" alt="Tech Solutions Logo" class="h-10 w-auto object-contain transition-transform group-hover:scale-105 drop-shadow-md">
          <span class="text-xl font-bold tracking-tight text-gray-900 dark:text-white hidden sm:block">Tech Solutions</span>
        </div>

        <div class="hidden md:flex items-center gap-8">
          <a href="#sobre-nosotros" class="text-sm font-medium text-gray-600 hover:text-brand-primary dark:text-gray-300 transition-colors">Sobre Nosotros</a>
          <a href="#servicios" class="text-sm font-medium text-gray-600 hover:text-brand-primary dark:text-gray-300 transition-colors">Servicios</a>
          <a href="#proceso" class="text-sm font-medium text-gray-600 hover:text-brand-primary dark:text-gray-300 transition-colors">Proceso</a>
          <a href="#proyectos" class="text-sm font-medium text-gray-600 hover:text-brand-primary dark:text-gray-300 transition-colors">Proyectos</a>
          <div class="h-6 w-px bg-gray-200 dark:bg-surface-border mx-2"></div>
          <button routerLink="/auth/login" class="ui-btn-primary !py-2 !px-5 text-sm">
            Iniciar Sesión
          </button>
        </div>

        <button (click)="toggleMenu()" class="md:hidden p-2 rounded-lg text-gray-600 dark:text-gray-300 focus:outline-none">
          <mat-icon>{{ isMenuOpen ? 'close' : 'menu' }}</mat-icon>
        </button>
      </div>
    </div>

    @if (isMenuOpen) {
      <div class="md:hidden bg-white dark:bg-surface-dark border-t border-gray-100 dark:border-surface-border absolute w-full shadow-lg">
        <div class="px-4 pt-2 pb-6 space-y-2">
          <a href="#sobre-nosotros" (click)="closeMenu()" class="block px-3 py-2 text-base font-medium text-gray-600 hover:text-brand-primary hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-800 rounded-md">Sobre Nosotros</a>
          <a href="#servicios" (click)="closeMenu()" class="block px-3 py-2 text-base font-medium text-gray-600 hover:text-brand-primary hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-800 rounded-md">Servicios</a>
          <a href="#proceso" (click)="closeMenu()" class="block px-3 py-2 text-base font-medium text-gray-600 hover:text-brand-primary hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-800 rounded-md">Proceso</a>
          <a href="#proyectos" (click)="closeMenu()" class="block px-3 py-2 text-base font-medium text-gray-600 hover:text-brand-primary hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-800 rounded-md">Proyectos</a>
          
          <div class="pt-4 mt-2 border-t border-gray-100 dark:border-surface-border">
            <button routerLink="/auth/login" (click)="closeMenu()" class="w-full ui-btn-primary !py-3 text-base">
              Iniciar Sesión
            </button>
          </div>
        </div>
      </div>
    }
  </nav>

  <main class="flex-1 overflow-x-hidden w-full relative">
    <router-outlet></router-outlet>
  </main>

  <footer class="bg-[#030712] py-10 border-t border-gray-800/50 relative z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      
      <div class="flex justify-center gap-6 mb-6">
        <a href="https://www.linkedin.com/in/abraham-chavez-937758340/" target="_blank" aria-label="LinkedIn"
           class="text-gray-500 hover:text-blue-500 transition-colors duration-300 transform hover:scale-110 hover:-translate-y-1">
          <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path fill-rule="evenodd" d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" clip-rule="evenodd" />
          </svg>
        </a>
      </div>
      
      <p class="text-gray-500 text-sm tracking-wide">
        &copy; {{ currentYear }} Tech Solutions. Todos los derechos reservados.
      </p>
    </div>
  </footer>
</div>
