<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Infraestructura y Servicios</h1>
    <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Gestiona dominios, hostings, VPS y mantén el control de las fechas de vencimiento.</p>
  </div>

  <app-data-table 
    title="Servicios Activos"
    [data]="services()" 
    [columns]="columns" 
    [actions]="actions"
    (actionClicked)="handleAction($event)"
    (createClicked)="createNewService()">
  </app-data-table>
</div>
