<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Finanzas y Pagos</h1>
    <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Registra anticipos, liquidaciones y renovaciones de tus clientes.</p>
  </div>

  <app-data-table 
    title="Historial de Pagos"
    [data]="payments()" 
    [columns]="columns" 
    [actions]="actions"
    (actionClicked)="handleAction($event)"
    (createClicked)="createNewPayment()">
  </app-data-table>
</div>
