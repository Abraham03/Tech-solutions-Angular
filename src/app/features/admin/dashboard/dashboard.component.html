<div class="space-y-6">
  
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Centro de Control</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm">Resumen financiero y operativo.</p>
    </div>
    <button routerLink="/admin/projects/new" class="ui-btn-primary text-sm py-2 px-3">
      <mat-icon class="scale-75">add</mat-icon> Nuevo Proyecto
    </button>
  </div>

  @if (error()) {
    <div class="bg-status-warning/10 text-status-warning p-4 rounded-lg text-sm border border-status-warning/20">
      <mat-icon class="align-middle mr-2 scale-75">info</mat-icon> {{ error() }}
    </div>
  }

  @if (isLoading()) {
    <div class="flex justify-center items-center py-20 text-brand-primary">
      <mat-icon class="animate-spin scale-150">sync</mat-icon>
    </div>
  }

  @if (dashboardData(); as data) {
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
      
      <app-metric-card 
        title="MRR (Mensual)" 
        [value]="formatMoney(data.metrics.mrr)" 
        icon="payments" 
        iconContainerClass="bg-status-success/10 text-status-success"
        trend="Ingreso recurrente" 
        trendColorClass="text-status-success">
      </app-metric-card>

      <app-metric-card 
        title="Clientes Activos" 
        [value]="data.metrics.activeClients" 
        icon="people" 
        iconContainerClass="bg-brand-primary/10 text-brand-primary"
        trend="Total de cuentas" 
        trendColorClass="text-brand-primary">
      </app-metric-card>

      <app-metric-card 
        title="Proyectos Activos" 
        [value]="data.metrics.activeProjects" 
        icon="rocket_launch" 
        iconContainerClass="bg-purple-500/10 text-purple-500"
        trend="En desarrollo" 
        trendColorClass="text-gray-500">
      </app-metric-card>

      <app-metric-card 
        title="Facturas Pendientes" 
        [value]="data.metrics.pendingInvoices" 
        icon="warning" 
        iconContainerClass="bg-status-error/10 text-status-error"
        trend="Requiere atención" 
        trendColorClass="text-status-error">
      </app-metric-card>

    </div>

    <div class="mt-8">
      <app-data-table 
        title="Proyectos Recientes"
        [data]="data.recentProjects" 
        [columns]="columns" 
        [actions]="[]"
        [showCreateButton]="false">
      </app-data-table>
    </div>
  }
</div>
